name: shell

on:
  push:
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck shfmt

      - name: Bash syntax check
        run: |
          bash -n bin/*
          bash -n lib/*
          bash -n install.sh
          bash -n uninstall.sh

      - name: Shellcheck
        run: |
          shellcheck bin/*
          shellcheck lib/*
          shellcheck install.sh
          shellcheck uninstall.sh

      - name: Shfmt
        run: |
          shfmt -d bin/*
          shfmt -d lib/*
          shfmt -d install.sh
          shfmt -d uninstall.sh
