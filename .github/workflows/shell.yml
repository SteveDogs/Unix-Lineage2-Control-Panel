name: shell

on:
  push:
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y curl tar xz-utils
          curl -fsSL -o /tmp/shellcheck.tar.xz https://github.com/koalaman/shellcheck/releases/download/v0.11.0/shellcheck-v0.11.0.linux.x86_64.tar.xz
          tar -xJf /tmp/shellcheck.tar.xz -C /tmp
          sudo install /tmp/shellcheck-v0.11.0/shellcheck /usr/local/bin/shellcheck
          curl -fsSL -o /tmp/shfmt https://github.com/mvdan/sh/releases/download/v3.13.1/shfmt_v3.13.1_linux_amd64
          sudo install /tmp/shfmt /usr/local/bin/shfmt

      - name: Bash syntax check
        run: |
          bash -n bin/*
          bash -n lib/*
          bash -n install.sh
          bash -n uninstall.sh

      - name: Shellcheck (advisory)
        continue-on-error: true
        run: |
          shellcheck -s bash bin/*
          shellcheck -s bash lib/*
          shellcheck -s bash install.sh
          shellcheck -s bash uninstall.sh

      - name: Shfmt
        run: |
          shfmt -d bin/*
          shfmt -d lib/*
          shfmt -d install.sh
          shfmt -d uninstall.sh
